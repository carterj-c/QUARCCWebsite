<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Research Notes Board</title>
  <desc id="desc">A QUARCC themed editorial image showing notebooks, a chart, and system callouts.</desc>
  <rect width="1200" height="680" fill="#0b0f1b"/>
  <rect x="52" y="52" width="1096" height="576" fill="#12182a" stroke="#30363d"/>
  <g stroke="#30363d" opacity="0.7">
    <path d="M120 120h960M120 220h960M120 320h960M120 420h960M120 520h960"/>
    <path d="M220 100v480M420 100v480M620 100v480M820 100v480"/>
  </g>
  <g font-family="JetBrains Mono, monospace" fill="#dfe7f6">
    <text x="108" y="114" font-size="24">QUARCC RESEARCH NOTEBOOK</text>
    <text x="108" y="150" font-size="14" opacity="0.72">FROM SEMINAR TAKEAWAYS TO TESTABLE SIGNALS</text>
  </g>
  <g>
    <rect x="112" y="190" width="270" height="320" fill="#0e1527" stroke="#58a6ff"/>
    <rect x="420" y="190" width="290" height="320" fill="#0e1527" stroke="#8957e5"/>
    <rect x="746" y="190" width="338" height="320" fill="#0e1527" stroke="#58a6ff"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="16">
    <text x="136" y="226" fill="#58a6ff">READ</text>
    <text x="444" y="226" fill="#8957e5">TEST</text>
    <text x="770" y="226" fill="#58a6ff">DEPLOY</text>
  </g>
  <g fill="#dfe7f6" font-family="JetBrains Mono, monospace" font-size="15">
    <text x="136" y="268">[1] Hypothesis from lecture notes</text>
    <text x="136" y="302">[2] Convert narrative to factor</text>
    <text x="136" y="336">[3] Define risk budget upfront</text>
    <text x="136" y="370">[4] Track assumptions explicitly</text>
    <text x="136" y="404">[5] Publish what failed</text>
  </g>
  <polyline fill="none" stroke="#8957e5" stroke-width="7" points="450,436 502,394 548,410 602,344 648,316 686,244"/>
  <g fill="#58a6ff">
    <circle cx="450" cy="436" r="8"/><circle cx="502" cy="394" r="8"/><circle cx="548" cy="410" r="8"/>
    <circle cx="602" cy="344" r="8"/><circle cx="648" cy="316" r="8"/><circle cx="686" cy="244" r="8"/>
  </g>
  <g fill="#dfe7f6" font-family="JetBrains Mono, monospace" font-size="14">
    <text x="770" y="272">signal_status = "candidate"</text>
    <text x="770" y="308">turnover_guard = enabled</text>
    <text x="770" y="344">capacity_review = pending</text>
    <text x="770" y="380">paper_trade = scheduled</text>
  </g>
  <text x="110" y="590" font-family="Iowan Old Style, Palatino Linotype, serif" font-size="46" fill="#f6f8fc">Good research compounds when the notes are structured.</text>
</svg>
