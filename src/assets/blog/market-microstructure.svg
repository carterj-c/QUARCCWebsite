<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Market Microstructure Diagram</title>
  <desc id="desc">An abstract chart with bid ask ladders and a QUARCC terminal style palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#151b2f"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#8957e5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="url(#bg)"/>
  <g opacity="0.15" stroke="#ffffff">
    <path d="M0 120h1200M0 260h1200M0 400h1200M0 540h1200"/>
    <path d="M120 0v680M320 0v680M520 0v680M720 0v680M920 0v680"/>
  </g>
  <g font-family="JetBrains Mono, monospace" fill="#e7ecf4">
    <text x="72" y="84" font-size="26">ORDER BOOK SNAPSHOT</text>
    <text x="72" y="114" font-size="16" opacity="0.75">BID / ASK DEPTH, SLIPPAGE, AND LIQUIDITY REGIMES</text>
  </g>
  <g>
    <rect x="72" y="162" width="316" height="330" fill="#0e1527" stroke="#58a6ff" opacity="0.8"/>
    <rect x="416" y="162" width="316" height="330" fill="#0e1527" stroke="#8957e5" opacity="0.8"/>
    <rect x="760" y="162" width="368" height="330" fill="#0e1527" stroke="#c8d4f1" opacity="0.65"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="14">
    <text x="96" y="198" fill="#58a6ff">BID LADDER</text>
    <text x="440" y="198" fill="#8957e5">ASK LADDER</text>
    <text x="784" y="198" fill="#c8d4f1">SIGNAL</text>
  </g>
  <g fill="#58a6ff">
    <rect x="96" y="228" width="78" height="18"/><rect x="96" y="258" width="112" height="18"/>
    <rect x="96" y="288" width="148" height="18"/><rect x="96" y="318" width="176" height="18"/>
    <rect x="96" y="348" width="202" height="18"/><rect x="96" y="378" width="236" height="18"/>
    <rect x="96" y="408" width="264" height="18"/><rect x="96" y="438" width="292" height="18"/>
  </g>
  <g fill="#8957e5">
    <rect x="440" y="228" width="84" height="18"/><rect x="440" y="258" width="128" height="18"/>
    <rect x="440" y="288" width="158" height="18"/><rect x="440" y="318" width="188" height="18"/>
    <rect x="440" y="348" width="216" height="18"/><rect x="440" y="378" width="242" height="18"/>
    <rect x="440" y="408" width="272" height="18"/><rect x="440" y="438" width="294" height="18"/>
  </g>
  <polyline fill="none" stroke="url(#line)" stroke-width="8" points="800,430 860,396 910,402 965,330 1035,352 1090,268"/>
  <g fill="#58a6ff">
    <circle cx="800" cy="430" r="8"/><circle cx="860" cy="396" r="8"/><circle cx="910" cy="402" r="8"/>
    <circle cx="965" cy="330" r="8"/><circle cx="1035" cy="352" r="8"/><circle cx="1090" cy="268" r="8"/>
  </g>
  <text x="800" y="554" font-family="JetBrains Mono, monospace" font-size="42" fill="#f4f7fd">Latency is an input, not an afterthought.</text>
</svg>
