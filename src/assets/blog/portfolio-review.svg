    <text x="616" y="248" font-size="15" fill="#8957e5">SHARPE</text>
    <text x="616" y="290" font-size="34" fill="#f6f8fc">1.8</text>
    <text x="856" y="248" font-size="15" fill="#8957e5">BETA</text>
    <text x="856" y="290" font-size="34" fill="#f6f8fc">0.45</text>
