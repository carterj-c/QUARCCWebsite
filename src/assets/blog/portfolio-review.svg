  <rect x="112" y="366" width="588" height="180" fill="#0e1527" stroke="#30363d"/>
  <rect x="736" y="366" width="308" height="180" fill="#0e1527" stroke="#30363d"/>
  <polyline fill="none" stroke="#58a6ff" stroke-width="8" points="140,502 212,470 284,460 356,408 428,420 500,368 572,338 670,296"/>
  <g fill="#58a6ff">
    <circle cx="140" cy="502" r="7"/><circle cx="212" cy="470" r="7"/><circle cx="284" cy="460" r="7"/>
    <circle cx="356" cy="408" r="7"/><circle cx="428" cy="420" r="7"/><circle cx="500" cy="368" r="7"/>
    <circle cx="572" cy="338" r="7"/><circle cx="670" cy="296" r="7"/>
  </g>
  <g font-family="JetBrains Mono, monospace" font-size="16" fill="#dfe7f6">
    <text x="766" y="408">AAPL   +7.30</text>
    <text x="766" y="442">GOOGL  +4.70</text>
    <text x="766" y="476">TSLA  -12.00</text>
