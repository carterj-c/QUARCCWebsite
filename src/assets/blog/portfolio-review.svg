<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio Review Dashboard</title>
  <desc id="desc">A stylized dashboard card showing portfolio metrics and chart panels.</desc>
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10182b"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="680" fill="#080b14"/>
  <rect x="72" y="72" width="1056" height="536" rx="12" fill="url(#panel)" stroke="#30363d"/>
  <g font-family="JetBrains Mono, monospace" fill="#e7ecf4">
    <text x="112" y="132" font-size="26">PAPER FUND REVIEW</text>
    <text x="112" y="166" font-size="14" opacity="0.72">POST-WORKSHOP PERFORMANCE SNAPSHOT</text>
  </g>
  <g>
    <rect x="112" y="210" width="212" height="118" fill="#0e1527" stroke="#58a6ff"/>
    <rect x="352" y="210" width="212" height="118" fill="#0e1527" stroke="#58a6ff"/>
    <rect x="592" y="210" width="212" height="118" fill="#0e1527" stroke="#8957e5"/>
    <rect x="832" y="210" width="212" height="118" fill="#0e1527" stroke="#8957e5"/>
  </g>
  <g font-family="JetBrains Mono, monospace">
